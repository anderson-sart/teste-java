spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_DATABASE:softline_db}
spring.datasource.username=${DB_USERNAME:softline_user}
spring.datasource.password=${DB_PASSWORD:softline_pass}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:changeme-secret-key-at-least-32-chars!!}
jwt.expiration=${JWT_EXPIRATION:86400}
