<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos - Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/menu">Sistema</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link active" href="/produtos">Produtos</a>
            <a class="nav-link" href="/clientes">Clientes</a>
            <a class="nav-link text-danger" href="/logout">Sair</a>
        </div>
    </div>
</nav>
<div class="container mt-4" x-data="produtos()" x-init="carregar()">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Produtos</h4>
        <a href="/produtos/create" class="btn btn-primary btn-sm"><i class="bi bi-plus-lg"></i> Novo</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <div class="mb-3 d-flex gap-2">
                <input type="text" class="form-control" placeholder="Pesquisar..." x-model="search" @input.debounce.400ms="carregar()">
                <select class="form-select form-select-sm" style="width:auto" x-model="perPage" @change="page=1; carregar()">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th @click="ordenar('codigo')" style="cursor:pointer">Código <i class="bi bi-arrow-down-up"></i></th>
                            <th @click="ordenar('descricao')" style="cursor:pointer">Descrição <i class="bi bi-arrow-down-up"></i></th>
                            <th>Grupo</th>
                            <th>Cód. Barras</th>
                            <th @click="ordenar('valorVenda')" style="cursor:pointer">Valor Venda <i class="bi bi-arrow-down-up"></i></th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-if="loading">
                            <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm"></div></td></tr>
                        </template>
                        <template x-for="p in items" :key="p.codigo">
                            <tr>
                                <td x-text="p.codigo"></td>
                                <td x-text="p.descricao"></td>
                                <td x-text="p.grupoProduto ? p.grupoProduto.descricao : '-'"></td>
                                <td x-text="p.codigoBarras || '-'"></td>
                                <td x-text="'R$ ' + Number(p.valorVenda).toFixed(2)"></td>
                                <td>
                                    <a :href="'/produtos/edit/' + p.codigo" class="btn btn-sm btn-outline-primary me-1"><i class="bi bi-pencil"></i></a>
                                    <button @click="deletar(p.codigo)" class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        </template>
                        <template x-if="!loading && items.length === 0">
                            <tr><td colspan="6" class="text-center text-muted py-4">Nenhum registro encontrado</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-3">
                <small class="text-muted" x-text="`${total} registro(s)`"></small>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-outline-secondary" :disabled="page <= 1" @click="page--; carregar()">‹</button>
                    <span class="btn btn-sm btn-light disabled" x-text="`${page} / ${lastPage}`"></span>
                    <button class="btn btn-sm btn-outline-secondary" :disabled="page >= lastPage" @click="page++; carregar()">›</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script th:inline="javascript">
const AUTH_TOKEN = [[${authToken}]];
function produtos() {
    return {
        items: [], total: 0, page: 1, lastPage: 1, perPage: 10, search: '', sortBy: 'codigo', sortDir: 'DESC', loading: false,
        async carregar() {
            this.loading = true;
            const r = await fetch(`/api/produtos?search=${this.search}&page=${this.page}&perPage=${this.perPage}&sortBy=${this.sortBy}&sortDir=${this.sortDir}`,
                { headers: { Authorization: 'Bearer ' + AUTH_TOKEN } });
            const d = await r.json();
            this.items = d.data; this.total = d.total; this.lastPage = d.lastPage;
            this.loading = false;
        },
        ordenar(col) { this.sortBy = col; this.sortDir = this.sortDir === 'ASC' ? 'DESC' : 'ASC'; this.page = 1; this.carregar(); },
        async deletar(id) {
            if (!confirm('Excluir produto?')) return;
            await fetch('/api/produtos/' + id, { method: 'DELETE', headers: { Authorization: 'Bearer ' + AUTH_TOKEN } });
            this.carregar();
        }
    }
}
</script>
</body>
</html>
