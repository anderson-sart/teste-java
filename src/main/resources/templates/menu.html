<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menu - Softline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">Softline</span>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/produtos">Produtos</a>
            <a class="nav-link" href="/clientes">Clientes</a>
            <a class="nav-link text-danger" href="/logout">Sair</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="row g-4 justify-content-center">
        <div class="col-md-4">
            <a href="/produtos" class="text-decoration-none">
                <div class="card text-center shadow-sm h-100 p-4">
                    <i class="bi bi-box fs-1 text-primary mb-3"></i>
                    <h5>Produtos</h5>
                    <p class="text-muted small">Cadastro e gestão de produtos</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/clientes" class="text-decoration-none">
                <div class="card text-center shadow-sm h-100 p-4">
                    <i class="bi bi-people fs-1 text-success mb-3"></i>
                    <h5>Clientes</h5>
                    <p class="text-muted small">Cadastro e gestão de clientes</p>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
