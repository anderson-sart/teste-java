<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cliente - Softline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/menu">Softline</a>
        <div class="navbar-nav flex-row gap-3">
            <a class="nav-link" href="/produtos">Produtos</a>
            <a class="nav-link active" href="/clientes">Clientes</a>
            <a class="nav-link text-danger" href="/logout">Sair</a>
        </div>
    </div>
</nav>
<div class="container mt-4" style="max-width:600px" x-data="form()" x-init="init()">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0" x-text="id ? 'Editar Cliente' : 'Novo Cliente'"></h4>
        <a href="/clientes" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i> Voltar</a>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <div x-show="erro" class="alert alert-danger" x-text="erro"></div>
            <div class="mb-3">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control" x-model="form.nome" maxlength="60">
            </div>
            <div class="mb-3">
                <label class="form-label">Fantasia</label>
                <input type="text" class="form-control" x-model="form.fantasia" maxlength="100">
            </div>
            <div class="mb-3">
                <label class="form-label">Documento (CPF/CNPJ) *</label>
                <input type="text" class="form-control" x-model="form.documento" maxlength="18">
            </div>
            <div class="mb-3">
                <label class="form-label">Endereço</label>
                <textarea class="form-control" x-model="form.endereco" rows="2"></textarea>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button class="btn btn-primary" @click="salvar()" :disabled="salvando">
                    <span x-show="salvando" class="spinner-border spinner-border-sm me-1"></span>
                    Salvar
                </button>
                <a href="/clientes" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </div>
    </div>
</div>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script>
function form() {
    return {
        id: null, form: { nome:'', fantasia:'', documento:'', endereco:'' },
        erro: '', salvando: false,
        token() { return document.cookie.split(';').find(c => c.trim().startsWith('auth_token='))?.split('=')[1] || ''; },
        async init() {
            const m = location.pathname.match(/\/clientes\/edit\/(\d+)/);
            if (m) {
                this.id = m[1];
                const r = await fetch('/api/clientes/' + this.id, { headers: { Authorization: 'Bearer ' + this.token() } });
                this.form = await r.json();
            }
        },
        async salvar() {
            this.salvando = true; this.erro = '';
            const url = this.id ? '/api/clientes/' + this.id : '/api/clientes';
            const method = this.id ? 'PUT' : 'POST';
            const r = await fetch(url, { method, headers: { Authorization: 'Bearer ' + this.token(), 'Content-Type': 'application/json' }, body: JSON.stringify(this.form) });
            const d = await r.json();
            if (r.ok) { location.href = '/clientes'; }
            else { this.erro = d.message || JSON.stringify(d.errors); }
            this.salvando = false;
        }
    }
}
</script>
</body>
</html>
