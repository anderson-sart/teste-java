services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: softline_db
      POSTGRES_USER: softline_user
      POSTGRES_PASSWORD: softline_pass
    ports:
      - "5433:5432"

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_DATABASE: softline_db
      DB_USERNAME: softline_user
      DB_PASSWORD: softline_pass
      JWT_SECRET: changeme-secret-key-at-least-32-chars!!
    depends_on:
      - db
